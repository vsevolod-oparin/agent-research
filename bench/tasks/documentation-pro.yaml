# Worst offender: documentation-pro (score 4)
# Tests: whether capability lists produce better docs than bare model

tasks:
  - task_id: dp-001
    input: |
      Write API documentation for this endpoint:
      POST /api/v1/orders
      Body: { product_id: string, quantity: number, shipping_address: object }
      Returns: 201 with order object, 400 for validation, 409 for out of stock.
      Auth: Bearer token required.
    ground_truth:
      must_mention:
        - request body schema with types and constraints
        - all response codes with example bodies
        - authentication requirement
        - rate limiting info (if applicable)
        - curl example or code snippet
      structure:
        - standard API doc format (endpoint, method, auth, request, response, examples)
        - not a wall of prose

  - task_id: dp-002
    input: |
      Write a getting-started guide for a CLI tool called "datapipe" that:
      - installs via npm (npm install -g datapipe)
      - reads CSV files and transforms them
      - basic usage: datapipe transform input.csv --format json
      - has a config file ~/.datapiperc
    ground_truth:
      must_mention:
        - installation command
        - verify installation (datapipe --version)
        - first example that works in under 1 minute
        - expected output shown
        - next steps / common commands
      must_not:
        - start with philosophy or background before the first command
      structure:
        - < 200 words to first working example
        - code blocks with copy-paste commands

  - task_id: dp-003
    input: |
      Document this function for other developers:
      ```python
      def retry(fn, max_attempts=3, backoff_factor=2, exceptions=(Exception,)):
          attempt = 0
          while True:
              try:
                  return fn()
              except exceptions as e:
                  attempt += 1
                  if attempt >= max_attempts:
                      raise
                  time.sleep(backoff_factor ** attempt)
      ```
    ground_truth:
      must_mention:
        - docstring with args, returns, raises
        - usage example with a real scenario
        - behavior explanation (exponential backoff: 2s, 4s, 8s...)
        - note that fn must be callable with no args
        - edge case: what happens with max_attempts=0
      structure:
        - docstring format (Google, NumPy, or Sphinx style)
        - example in docstring

  - task_id: dp-004
    input: |
      Write a troubleshooting guide for a web app that has these common issues:
      1. "Connection refused" on startup
      2. "Token expired" errors after login
      3. Slow page loads (> 5 seconds)
      4. File upload fails for large files
    ground_truth:
      must_mention:
        - symptom → likely cause → fix format for each
        - specific commands to check each issue
        - config values to adjust (timeouts, file size limits)
        - when to escalate vs self-fix
      structure:
        - searchable/scannable (not paragraphs)
        - each issue is self-contained

  - task_id: dp-005
    input: |
      Create a changelog entry for version 2.5.0 that includes:
      - Added WebSocket support for real-time updates
      - Fixed memory leak in cache module (#1234)
      - Deprecated the /api/v1/legacy endpoint
      - Breaking: minimum Node.js version is now 18
    ground_truth:
      must_mention:
        - categorized sections (Added, Fixed, Deprecated, Breaking)
        - issue/PR references
        - migration guidance for breaking change
        - deprecation timeline
      structure:
        - Keep a Changelog format (or similar standard)
        - scannable, not narrative
